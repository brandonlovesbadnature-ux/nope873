<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nope</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --purple1:#8b5cf6;
  --purple2:#6d28d9;
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.12);
}

/* Reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui,sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top, #1a0b2e, #05010a);
  color:#fff;
}

/* Canvas background */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* Center wrapper */
.wrapper{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Floating glossy island card */
.card{
  width:800px;
  max-width:95%;
  padding:50px;
  border-radius:30px;

  background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
  border:1px solid var(--border);

  backdrop-filter: blur(30px);
  box-shadow:
    0 40px 120px rgba(0,0,0,0.8),
    inset 0 1px rgba(255,255,255,0.2);

  text-align:center;
  position:relative;
  overflow:hidden;
}

/* Glossy highlight */
.card::before{
  content:"";
  position:absolute;
  inset:-200px;
  background: radial-gradient(circle at top, rgba(139,92,246,0.25), transparent 60%);
  z-index:0;
}

/* Title */
h1{
  position:relative;
  z-index:1;
  font-size:2.6rem;
  margin-bottom:20px;
  background: linear-gradient(90deg,#fff,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Tabs */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:25px;
  position:relative;
  z-index:1;
}

.tab{
  flex:1;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.07);
  cursor:pointer;
  transition:0.2s;
}

.tab.active{
  background:linear-gradient(135deg,var(--purple1),var(--purple2));
}

.section{display:none;}
.section.active{display:block;}

/* Buttons */
.btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.15);

  background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(255,255,255,0.05));
  color:#fff;

  cursor:pointer;
  margin-bottom:10px;

  transition: transform 0.15s ease, box-shadow 0.2s ease;
  position:relative;
}

/* Magnetic hover glow */
.btn:hover{
  box-shadow:
    0 10px 30px rgba(139,92,246,0.35),
    inset 0 1px rgba(255,255,255,0.2);
}

/* Input */
.input-group{
  display:flex;
  gap:10px;
  margin-top:15px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

/* Cursor trail */
.trail{
  position:fixed;
  width:14px;
  height:14px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle,rgba(167,139,250,0.9),transparent 70%);
  filter:blur(6px);
  animation:fade 0.4s linear forwards;
  z-index:999;
}

@keyframes fade{
  to{opacity:0; transform:scale(1.6);}
}

/* Subtext */
.small{
  margin-top:20px;
  opacity:0.6;
  font-size:12px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrapper">
  <div class="card">

    <h1>nope</h1>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('home',this)">Home</div>
      <div class="tab" onclick="switchTab('misc',this)">Misc</div>
      <div class="tab" onclick="switchTab('settings',this)">Settings</div>
    </div>

    <!-- HOME -->
    <div id="home" class="section active">
      <button class="btn" onclick="openBlank('https://truffled.onrender.com')">Truffled</button>
      <button class="btn" onclick="openBlank('https://sdxp.onrender.com')">SDXP</button>
      <button class="btn" onclick="openBlank('https://fern.onrender.com')">Fern</button>
      <button class="btn" onclick="openBlank('https://ghostlink.onrender.com')">Ghostlink</button>
      <button class="btn" onclick="openBlank('https://apollo.onrender.com')">Apollo</button>

      <div class="input-group">
        <input id="url" placeholder="https://example.com">
        <button class="btn" onclick="openCustom()">Open</button>
      </div>
    </div>

    <!-- MISC -->
    <div id="misc" class="section">
      <input id="panicUrl" placeholder="Panic URL">
      <button class="btn" onclick="savePanic()">Save Panic</button>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="section">
      <button class="btn" onclick="applyCloak()">Apply Cloak</button>
    </div>

    <div class="small">made by nope</div>

  </div>
</div>

<script>
/* Tabs */
function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

/* Open blank */
function openBlank(url){
  const w = window.open();
  w.document.write(`<iframe src="${url}" style="border:none;width:100vw;height:100vh;"></iframe>`);
}

/* Custom */
function openCustom(){
  let url = document.getElementById('url').value.trim();
  if(!url) return;
  if(!url.startsWith('http')) url = 'https://' + url;
  openBlank(url);
}

/* Panic */
let panic = localStorage.getItem('panic') || 'https://google.com';
function savePanic(){
  const val = document.getElementById('panicUrl').value.trim();
  if(val){
    panic = val;
    localStorage.setItem('panic', panic);
  }
}
document.addEventListener('keydown', e=>{
  if(e.key === '`') location.href = panic;
});

/* Cloak */
function applyCloak(){
  document.title = "Google";
}

/* Magnetic buttons */
document.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('mousemove', e=>{
    const r = btn.getBoundingClientRect();
    const x = e.clientX - r.left;
    const y = e.clientY - r.top;

    const mx = (x - r.width/2)/10;
    const my = (y - r.height/2)/10;

    btn.style.transform = `translate(${mx}px,${my}px) scale(1.05)`;
  });

  btn.addEventListener('mouseleave', ()=>{
    btn.style.transform = 'translate(0,0) scale(1)';
  });
});

/* Cursor trail */
document.addEventListener('mousemove', e=>{
  const d = document.createElement('div');
  d.className = 'trail';
  d.style.left = e.clientX + 'px';
  d.style.top = e.clientY + 'px';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),400);
});

/* Bouncing particles */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

const balls = Array.from({length:80},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*3+1,
  dx:(Math.random()-0.5)*1.2,
  dy:(Math.random()-0.5)*1.2
}));

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  balls.forEach(b=>{
    b.x += b.dx;
    b.y += b.dy;

    if(b.x<0||b.x>canvas.width) b.dx*=-1;
    if(b.y<0||b.y>canvas.height) b.dy*=-1;

    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle = 'rgba(168,139,250,0.6)';
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
