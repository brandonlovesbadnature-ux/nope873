<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>nope</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>

#particles {
  position: fixed;
  inset: 0;
  z-index: 1; 
  pointer-events: none;
}
    
    :root {
      --p1:#a855f7;
      --p2:#7c3aed;
      --p3:#c084fc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top, #0a0014, #000);
      color: #fff;
    }

    /* animated glow bg */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(168,85,247,.25), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(192,132,252,.2), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(124,58,237,.25), transparent 40%);
      filter: blur(80px);
      animation: move 14s infinite linear;
      z-index: 0;
    }

    @keyframes move {
      0%   { transform: translate(0, 0); }
      50%  { transform: translate(-60px, 40px); }
      100% { transform: translate(0, 0); }
    }

    .wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 16px;
    }

    /* LIQUID GLASS CARD */
    .card {
      width: min(900px, 100%);
      padding: 28px 26px 22px;
      border-radius: 28px;
      position: relative;
      overflow: hidden;

      background: linear-gradient(145deg, rgba(20,0,40,.7), rgba(40,0,80,.5));
      backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: 0 40px 140px rgba(0,0,0,.9);
    }

    /* moving gloss */
    .card::before {
      content: "";
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 60%);
      animation: glassMove 10s linear infinite;
      mix-blend-mode: screen;
      opacity: .75;
      pointer-events: none;
    }

    @keyframes glassMove {
      0%   { transform: translate(-18%, -18%); }
      50%  { transform: translate(18%, 18%); }
      100% { transform: translate(-18%, -18%); }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 2.2rem;
      background: linear-gradient(90deg, #fff, #c4b5fd, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .03em;
    }

    .subtitle {
      font-size: .7rem;
      color: #c4b5fd;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    /* tabs */
    .tabs {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(8,0,20,.85);
      border: 1px solid rgba(255,255,255,.06);
    }

    .tab {
      padding: 6px 14px;
      border-radius: 999px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: .78rem;
      color: #a5b4fc;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: .2s;
      white-space: nowrap;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--p1), var(--p2));
      color: #f9fafb;
      box-shadow: 0 0 20px rgba(168,85,247,.6);
    }

    main {
      margin-top: 16px;
    }

    /* sections */
    .section { display: none; }
    .section.active { display: block; }

    /* prox grid */
    .grid-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .proxy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.09);
      background: radial-gradient(circle at top left, rgba(192,132,252,.35), transparent 50%),
                  linear-gradient(145deg, #1a0033, #3b0764);
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .18s ease, box-shadow .24s ease, border-color .2s;
      text-align: left;
    }

    .btn-label {
      font-size: .88rem;
      font-weight: 500;
    }

    .btn-sub {
      font-size: .68rem;
      opacity: .65;
      margin-top: 2px;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: -30%;
      background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,.22), transparent 58%);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .btn:hover::before { opacity: 1; }

    .btn:hover {
      box-shadow: 0 20px 60px rgba(168,85,247,.7);
      border-color: rgba(255,255,255,.18);
    }

    .btn:active {
      transform: translateY(1px) scale(.99);
      box-shadow: 0 10px 30px rgba(15,23,42,.9);
    }

    /* settings layout */
    .settings-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 16px;
      margin-top: 8px;
    }

    @media (max-width: 780px) {
      .settings-grid {
        grid-template-columns: minmax(0, 1fr);
      }
      header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    .block-label {
      font-size: .72rem;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    input {
      width: 100%;
      padding: 10px 11px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(11,0,26,.9);
      color: white;
      font-size: .8rem;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    input::placeholder {
      color: rgba(148,163,184,.9);
    }

    input:focus {
      border-color: rgba(192,132,252,.9);
      box-shadow: 0 0 0 1px rgba(192,132,252,.7);
      background: rgba(15,6,35,.98);
    }

    .settings-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hint {
      font-size: .7rem;
      opacity: .7;
      text-align: right;
      margin-top: 4px;
    }

    footer {
      margin-top: 12px;
      font-size: .7rem;
      opacity: .7;
      text-align: right;
    }

    /* cursor trail */
    .trail {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c084fc;
      pointer-events: none;
      animation: f .45s forwards;
      filter: blur(.5px);
      mix-blend-mode: screen;
      z-index: 9999;
    }

    @keyframes f {
      0%   { opacity: .9; transform: scale(1); }
      100% { opacity: 0;  transform: scale(.3) translateY(4px); }
    }
  </style>
</head>

<body>
  <div class="wrapper">

  <script>

    /* coffe loader */
    function openBlank(url) {
      const w = window.open('about:blank', '_blank');
      if (!w) return;

      const loaderHTML = `

    function openCustom() {
      let url = document.getElementById('url').value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      openBlank(url);

    /* panic */
    let panic = localStorage.getItem('panic') || 'https://google.com';

    function savePanic() {
      const v = document.getElementById('panicUrl').value.trim();
      if (v) {
        panic = v;
        localStorage.setItem('panic', panic);
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === '`') location.href = panic;
    });

    /* cloak */
    function applyCloak(title) {
      document.title = title || 'Google';
    }

    /* magnetic buttons */
    document.querySelectorAll('[data-magnetic]').forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const r = btn.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;
        btn.style.setProperty('--x', x + 'px');
        btn.style.setProperty('--y', y + 'px');
        btn.style.transform = `translate(${(x - r.width / 2) / 10}px, ${(y - r.height / 2) / 10}px)`;
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.transform = 'translate(0,0)';
      });
    });

    /* trail */
    document.addEventListener('mousemove', e => {
      const d = document.createElement('div');

      d.style.top = e.clientY + 'px';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 450);
    });
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + Math.random() * 100;
    this.size = Math.random() * 2.5 + 0.5;
    this.speedY = Math.random() * 0.6 + 0.2;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.6 + 0.2;
  }

  update() {
    this.y -= this.speedY;
    this.x += this.speedX;

    if (this.y < -10) this.reset();
  }

  draw() {
    ctx.beginPath();
    ctx.fillStyle = `rgba(168,85,247,${this.opacity})`; // purple
    ctx.shadowBlur = 12;
    ctx.shadowColor = "#a855f7";
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// create particles
for (let i = 0; i < 120; i++) {
  particles.push(new Particle());
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

animate();
