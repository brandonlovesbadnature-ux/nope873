<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nope</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --glass-bg:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.1);
  --blur:30px;
  --radius:32px;
  --anim:0.25s ease;
}

/* Reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui,sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  color:#fff;
  background:#020617; /* removed purple */
}

/* Canvas */
canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* Wrapper */
.wrapper{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Card */
.card{
  width:720px;
  max-width:95%;
  padding:40px;
  border-radius:var(--radius);
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(var(--blur));
  box-shadow:0 40px 120px rgba(0,0,0,0.7);
  text-align:center;
  position:relative;
}

/* Title */
h1{
  font-size:2.4rem;
  margin-bottom:1.2rem;
}

/* Tabs */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.tab{
  flex:1;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  transition:var(--anim);
}

.tab:hover{
  transform:translateY(-2px);
}

.tab.active{
  background:rgba(255,255,255,0.15); /* no purple */
}

/* Sections */
.section{display:none;}
.section.active{display:block;}

/* Buttons */
.btn{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);
  color:#fff;
  cursor:pointer;
  transition:background .2s ease, transform .2s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn:hover{
  background:rgba(255,255,255,0.12);
}

.small-btn{
  width:auto;
  padding:12px 18px;
}

/* Inputs */
.input-group{
  display:flex;
  gap:10px;
  margin:15px 0;
}

input, select{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

/* Toggle */
.toggle-wrapper{
  position:absolute;
  top:12px;
  right:12px;
}

.toggle{
  appearance:none;
  width:44px;
  height:24px;
  background:#555;
  border-radius:12px;
  position:relative;
  cursor:pointer;
}

.toggle::before{
  content:"";
  position:absolute;
  inset:2px;
  width:20px;
  height:20px;
  background:#fff;
  border-radius:50%;
  transition:transform .2s;
}

.toggle:checked::before{
  transform:translateX(20px);
}

/* Small text */
.small{
  margin-top:15px;
  opacity:.6;
  font-size:12px;
}

/* Focus */
button:focus,
input:focus,
select:focus{
  outline:2px solid #fff;
  outline-offset:2px;
}

/* Mobile */
@media (max-width:500px){
  .card{padding:20px;}
  h1{font-size:2rem;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrapper">
  <div class="card">

    <div class="toggle-wrapper">
      <input type="checkbox" id="darkToggle" class="toggle">
    </div>

    <h1>nope</h1>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('home',this)">Home</div>
      <div class="tab" onclick="switchTab('misc',this)">Misc</div>
      <div class="tab" onclick="switchTab('settings',this)">Settings</div>
    </div>

    <!-- HOME -->
    <div id="home" class="section active">
      <button class="btn" onclick="openBlank('https://truffled.onrender.com')">Truffled</button>
      <button class="btn" onclick="openBlank('https://sdxp.onrender.com')">SDXP</button>
      <button class="btn" onclick="openBlank('https://fern.onrender.com')">Fern</button>
      <button class="btn" onclick="openBlank('https://ghostlink.onrender.com')">Ghostlink</button>
      <button class="btn" onclick="openBlank('https://apollo.onrender.com')">Apollo</button>

      <div class="input-group">
        <input id="url" placeholder="https://example.com">
        <button class="btn small-btn" onclick="openCustom()">Open</button>
      </div>

      <button class="btn" onclick="joinDiscord()">Join Discord</button>
    </div>

    <!-- MISC -->
    <div id="misc" class="section">
      <input id="panicUrl" placeholder="Panic URL">
      <button class="btn" onclick="savePanic()">Save Panic</button>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="section">
      <select id="cloak">
        <option value="Google">Google</option>
        <option value="Classroom">Classroom</option>
      </select>
      <button class="btn" onclick="applyCloak()">Apply Cloak</button>
    </div>

    <div class="small">made by nope</div>

  </div>
</div>

<script>
/* Tabs */
function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

/* Open blank */
function openBlank(url){
  const w = window.open();
  w.document.write(`<iframe src="${url}" style="border:none;width:100vw;height:100vh;"></iframe>`);
}

/* Custom URL */
function openCustom(){
  let url = document.getElementById('url').value.trim();
  if(!url) return;
  if(!url.startsWith('http')) url = 'https://' + url;
  openBlank(url);
}

/* Discord */
function joinDiscord(){
  openBlank('https://discord.gg/');
}

/* Panic */
let panic = localStorage.getItem('panic') || 'https://google.com';
function savePanic(){
  const val = document.getElementById('panicUrl').value.trim();
  if(val){
    panic = val;
    localStorage.setItem('panic', panic);
  }
}
document.addEventListener('keydown', e=>{
  if(e.key === '`') location.href = panic;
});

/* Cloak */
function applyCloak(){
  const choice = document.getElementById('cloak').value;
  if(choice === 'Google'){
    document.title = 'Google';
    setFavicon('https://www.google.com/favicon.ico');
  }else{
    document.title = 'Classes';
    setFavicon('https://ssl.gstatic.com/classroom/favicon.png');
  }
}

function setFavicon(url){
  let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
  link.rel = 'icon';
  link.href = url;
  document.head.appendChild(link);
}

/* Particles (neutral color) */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const particles = Array.from({length:100},()=>({
  x: Math.random()*canvas.width,
  y: Math.random()*canvas.height,
  r: Math.random()*1.5+0.2,
  dx:(Math.random()-0.5)*0.3,
  dy:(Math.random()-0.5)*0.3
}));

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

/* Toggle theme (subtle only) */
document.getElementById('darkToggle').addEventListener('change', e=>{
  document.body.style.background = e.target.checked ? '#0b1220' : '#020617';
});
</script>

</body>
</html>
