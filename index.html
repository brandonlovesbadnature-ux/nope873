<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nope</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #6d28d9, #2e1065);
  color: white;
  overflow: hidden;
}

/* TITLE */
h1 {
  text-align: center;
  padding: 25px;
  font-size: 42px;
  letter-spacing: 2px;
}

/* SPARKLES */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  filter: blur(2px);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  20% { opacity: 1; }
  to {
    transform: translateY(-10vh) scale(1);
    opacity: 0;
  }
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 25px;
  padding: 40px;
  max-width: 900px;
  margin: auto;
}

/* APP BOX */
.box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 18px;
  text-align: center;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.35s cubic-bezier(.25,.8,.25,1);
  border: 1px solid rgba(255,255,255,0.1);
}

/* HOVER MAGIC */
.box:hover {
  transform: translateY(-8px) scale(1.06);
  background: rgba(255,255,255,0.15);
  box-shadow: 0 15px 35px rgba(0,0,0,0.4),
              0 0 20px rgba(124,58,237,0.6);
}

.title {
  font-size: 18px;
  font-weight: 600;
}

/* FULLSCREEN VIEW */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  display: none;
  flex-direction: column;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

iframe {
  flex: 1;
  border: none;
}

/* TOP BAR */
.topbar {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 10px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.appName {
  font-size: 14px;
  opacity: 0.7;
}

.closeBtn {
  background: rgba(255,0,0,0.8);
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.closeBtn:hover {
  background: red;
}
</style>
</head>

<body>

<h1>nope</h1>

<!-- SPARKLES -->
<script>
for (let i = 0; i < 40; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (10 + Math.random() * 15) + "s";
  s.style.opacity = Math.random();
  document.body.appendChild(s);
}
</script>

<!-- APP GRID -->
<div class="grid">

  <div class="box" onclick="openApp('desmoscalculator.onrender.com', 'Apollo')">
    <div class="title">Apollo</div>
  </div>

  <div class="box" onclick="openApp('youtube.com', 'yt')">
    <div class="title">Games</div>
  </div>

  <div class="box" onclick="openApp('https://www.myinstants.com/en/categories/sound%20effects/us/', 'Tools')">
    <div class="title">Tools</div>
  </div>

</div>

<!-- FULLSCREEN VIEW -->
<div class="viewer" id="viewer">
  <div class="topbar">
    <div class="appName" id="appName">Loading...</div>
    <button class="closeBtn" onclick="closeApp()">Close</button>
  </div>
  <iframe id="frame"></iframe>
</div>

<script>
function openApp(url, name) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("frame").src = url;
  document.getElementById("appName").innerText = name;
}

function closeApp() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("frame").src = "";
}
</script>

</body>
</html>
