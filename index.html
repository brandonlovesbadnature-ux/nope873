<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>nope</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --purple1:#a855f7;
  --purple2:#7c3aed;
  --accent:#c084fc;
  --bg1:#0a0014;
  --bg2:#1a0033;
  --glass:rgba(168,85,247,.08);
  --border:rgba(168,85,247,.25);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui;}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,var(--bg1),#000);
color:#f5f3ff;
}

canvas{position:fixed;inset:0;z-index:0;}

.wrapper{
position:relative;
z-index:2;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.card{
width:860px;
max-width:100%;
padding:28px;
border-radius:30px;
background:
radial-gradient(circle at 0% 0%,rgba(168,85,247,.35),transparent 55%),
radial-gradient(circle at 100% 0%,rgba(192,132,252,.22),transparent 55%),
linear-gradient(145deg,rgba(20,0,40,.95),rgba(40,0,80,.9));
border:1px solid var(--border);
backdrop-filter:blur(25px);
box-shadow:0 40px 120px rgba(0,0,0,.8);
}

.header-panel{
border-radius:20px;
padding:14px 18px;
margin-bottom:20px;
background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.04));
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(25px);
}

h1{
font-size:2.3rem;
background:linear-gradient(90deg,#fff,#c4b5fd,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:.75rem;
letter-spacing:.2em;
text-transform:uppercase;
color:#c4b5fd;
}

.tabs{display:flex;gap:8px;margin-bottom:16px;}

.tab{
flex:1;
padding:8px;
border-radius:999px;
background:#140028;
border:1px solid var(--border);
cursor:pointer;
text-align:center;
font-size:.75rem;
letter-spacing:.12em;
transition:.2s;
}

.tab.active{
background:linear-gradient(135deg,var(--purple1),var(--purple2));
box-shadow:0 10px 30px rgba(168,85,247,.6);
}

.section{display:none;}
.section.active{display:block;}

.btn{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:14px;
border:1px solid var(--border);
background:
radial-gradient(circle at 0% 0%,rgba(168,85,247,.5),transparent 55%),
radial-gradient(circle at 100% 0%,rgba(192,132,252,.4),transparent 55%),
linear-gradient(145deg,#1a0033,#3b0764);
color:#fff;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 15px 40px rgba(168,85,247,.7);
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:#140028;
color:#fff;
}

.input-group{display:flex;gap:10px;margin-top:14px;}

.small{
margin-top:14px;
font-size:.7rem;
text-align:right;
opacity:.6;
}

.small span{
background:linear-gradient(90deg,var(--purple1),var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* cursor trail */
.trail{
position:fixed;
width:6px;height:6px;
border-radius:50%;
background:#c084fc;
pointer-events:none;
opacity:.8;
animation:fade .4s forwards;
}
@keyframes fade{to{opacity:0;transform:scale(.3);}}

/* responsive */
@media(max-width:640px){
.card{padding:20px;}
h1{font-size:1.8rem;}
}
</style>
</head>

<body>
<canvas id="bg"></canvas>

<div class="wrapper">
<div class="card">
<div class="header-panel">
<h1>nope</h1>
<div class="subtitle">Pr0xy launcher</div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('home',this)">Home</div>
<div class="tab" onclick="switchTab('misc',this)">Misc</div>
<div class="tab" onclick="switchTab('settings',this)">Settings</div>
</div>

<div id="home" class="section active">
<button class="btn" onclick="openBlank('https://truffled.onrender.com')">Truffled</button>
<button class="btn" onclick="openBlank('https://sdxp.onrender.com')">SDXP</button>
<button class="btn" onclick="openBlank('https://fern.onrender.com')">Fern</button>
<button class="btn" onclick="openBlank('https://ghostlink.onrender.com')">Ghostlink</button>
<button class="btn" onclick="openBlank('https://apollo.onrender.com')">Apollo</button>

<div class="input-group">
<input id="url" placeholder="https://example.com">
<button class="btn" onclick="openCustom()">Open</button>
</div>
</div>

<div id="misc" class="section">
<input id="panicUrl" placeholder="Panic URL">
<button class="btn" style="margin-top:10px" onclick="savePanic()">Save Panic</button>
</div>

<div id="settings" class="section">
<button class="btn" onclick="applyCloak()">Apply Cloak</button>
</div>

<div class="small">made by <span>nope</span></div>
</div>
</div>

<script>
function switchTab(id,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
el.classList.add('active');
document.getElementById(id).classList.add('active');
}

/* ☕ COFFEE LOADER */
function openBlank(url){
const w=window.open('about:blank','_blank');
if(!w)return;

const html=`
<!DOCTYPE html>
<html>
<head>
<style>
body{
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#0a0014;
color:#fff;
font-family:sans-serif;
}

/* mug */
.mug{
width:90px;height:70px;
background:linear-gradient(#a855f7,#7c3aed);
border-radius:0 0 20px 20px;
position:relative;
box-shadow:0 0 30px rgba(168,85,247,.6);
}
.mug:after{
content:"";
position:absolute;
right:-20px;top:10px;
width:20px;height:30px;
border:4px solid #c084fc;
border-left:none;
border-radius:0 12px 12px 0;
}

/* steam */
.steam span{
position:absolute;
width:8px;height:25px;
background:linear-gradient(#fff,transparent);
top:-20px;border-radius:50%;
animation:s 2s infinite;
}
.steam span:nth-child(1){left:20px;}
.steam span:nth-child(2){left:40px;animation-delay:.4s;}
.steam span:nth-child(3){left:60px;animation-delay:.8s;}

@keyframes s{
0%{opacity:.6;transform:translateY(0);}
100%{opacity:0;transform:translateY(-25px) scale(1.4);}
}

.label{
position:absolute;
margin-top:120px;
font-size:11px;
letter-spacing:.15em;
color:#c4b5fd;
text-align:center;
width:200px;
}

iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:none;
}
</style>
</head>

<body>
<div id="loader">
<div class="mug"></div>
<div class="steam">
<span></span><span></span><span></span>
</div>
<div class="label">Loading Portal using Cafe ☕</div>
</div>

<script>
const f=document.createElement('iframe');
f.src=${JSON.stringify(url)};
f.onload=()=>document.getElementById('loader').style.display='none';
document.body.appendChild(f);
<\/script>
</body>
</html>`;

w.document.write(html);
}

/* other functions */
function openCustom(){
let url=document.getElementById('url').value.trim();
if(!url)return;
if(!/^https?:\\/\\//i.test(url))url='https://'+url;
openBlank(url);
}

let panic=localStorage.getItem('panic')||'https://google.com';
function savePanic(){
const v=document.getElementById('panicUrl').value.trim();
if(v){panic=v;localStorage.setItem('panic',panic);}
}

document.addEventListener('keydown',e=>{
if(e.key==='`')location.href=panic;
});

function applyCloak(){document.title='Google';}

/* cursor trail */
document.addEventListener('mousemove',e=>{
const d=document.createElement('div');
d.className='trail';
d.style.left=e.clientX+'px';
d.style.top=e.clientY+'px';
document.body.appendChild(d);
setTimeout(()=>d.remove(),400);
});

/* particles */
const c=document.getElementById('bg');
const x=c.getContext('2d');

function r(){c.width=innerWidth;c.height=innerHeight;}
r();window.onresize=r;

const balls=Array.from({length:70},()=>({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*3+1,
dx:(Math.random()-.5),
dy:(Math.random()-.5)
}));

(function a(){
x.clearRect(0,0,c.width,c.height);
balls.forEach(b=>{
b.x+=b.dx;b.y+=b.dy;
if(b.x<0||b.x>c.width)b.dx*=-1;
if(b.y<0||b.y>c.height)b.dy*=-1;
x.beginPath();
x.arc(b.x,b.y,b.r,0,Math.PI*2);
x.fillStyle='rgba(168,85,247,.7)';
x.fill();
});
requestAnimationFrame(a);
})();
</script>
</body>
</html>
