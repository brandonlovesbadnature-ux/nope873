body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #7c3aed, #2e1065 70%);
  color: white;
}

h1 {
  text-align: center;
  padding: 30px;
  font-size: 44px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 25px;
  padding: 40px;
  max-width: 1100px;
  margin: auto;
}

.box {
  padding: 25px;
  border-radius: 18px;
  text-align: center;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  transition: 0.3s;
}

.box:hover {
  transform: translateY(-8px) scale(1.05);
  background: rgba(255,255,255,0.15);
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

.title { font-size: 18px; }
.desc { font-size: 13px; opacity: 0.7; }

.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  animation: float 12s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 0; }
}

#disclaimer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.disclaimer-box {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 16px;
  text-align: center;
}
</style>
