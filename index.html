<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nope</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;

  background:
    radial-gradient(circle at 20% 20%, #9333ea, transparent 40%),
    radial-gradient(circle at 80% 0%, #7c3aed, transparent 40%),
    #020617;

  color:white;
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* MAIN */
.wrap{text-align:center;}

h1{
  font-size:48px;
  margin-bottom:20px;

  background:linear-gradient(90deg,#c084fc,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:0 0 40px rgba(168,85,247,.6);
}

/* CARD */
.card{
  width:520px;
  padding:30px;
  border-radius:22px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px);

  border:1px solid rgba(255,255,255,0.12);

  box-shadow:
    0 25px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.15);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  margin-bottom:20px;
}

.box{
  padding:18px;
  border-radius:14px;
  cursor:pointer;

  background:linear-gradient(
    145deg,
    rgba(255,255,255,0.1),
    rgba(255,255,255,0.02)
  );

  border:1px solid rgba(255,255,255,0.12);
  transition:.25s;
}

.box:hover{
  transform:scale(1.06);
  box-shadow:0 0 30px rgba(168,85,247,.7);
}

/* INPUT */
.section{margin-bottom:15px;}

input{
  width:65%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* BUTTON */
button{
  position:relative;
  overflow:hidden;

  padding:12px 16px;
  margin-left:10px;

  border:none;
  border-radius:10px;

  background:linear-gradient(135deg,#7c3aed,#a855f7);
  color:white;

  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(168,85,247,.6);
}

/* DISCORD */
.discord{
  width:100%;
  background:#5865F2;
}

/* DIVIDER */
.divider{
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:20px 0;
}

/* RIPPLE */
button span{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.4);
  transform:scale(0);
  animation:ripple .6s linear;
}

@keyframes ripple{
  to{transform:scale(4);opacity:0;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrap">
<h1>nope</h1>

<div class="card">

<div class="grid">
  <div class="box" onclick="openRotating('truffled')">Truffled</div>
  <div class="box" onclick="openRotating('sdxp')">SDXP</div>
  <div class="box" onclick="openRotating('fern')">Fern</div>
  <div class="box" onclick="openRotating('ghostlink')">Ghostlink</div>
  <div class="box" onclick="openRotating('apollo')">Apollo</div>
</div>

<div class="divider"></div>

<div class="section">
  <input id="url" placeholder="https://example.com">
  <button onclick="openCustom(event)">Open</button>
</div>

<div class="section">
  <button class="discord" onclick="joinDiscord(event)">Join Discord</button>
</div>

</div>
</div>

<script>
/* PARTICLES */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2,dx:(Math.random()-.5)*.5,dy:(Math.random()-.5)*.5});
}

function anim(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(o=>{
    o.x+=o.dx;o.y+=o.dy;
    ctx.beginPath();
    ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
    ctx.fillStyle="rgba(168,85,247,.7)";
    ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();

/* LINKS */
const links={
  truffled:[
    "https://newyork-newspaperprinter.socialistsushi.com/",
    "https://info.callcentercuritibia.com.br/",
    "https://everyonefromthe383.383.li/"
  ],
  sdxp:[
    "https://google.com",
    "https://example.com"
  ],
  fern:[
    "https://storage.googleapis.com/fernisbest/index.html"
  ],
  ghostlink:[
    "https://desmos.42web.io/"
  ],
  apollo:[
    "https://desmoscalculator.onrender.com"
  ]
};

let indexTracker={};

/* ROTATE */
function openRotating(k){
  if(!indexTracker[k]) indexTracker[k]=0;
  let url=links[k][indexTracker[k]];
  indexTracker[k]=(indexTracker[k]+1)%links[k].length;
  openBlank(url);
}

/* ABOUT BLANK */
function openBlank(url){
  let tab=window.open("about:blank","_blank");
  tab.document.write(`
    <body style="margin:0;background:black">
      <iframe src="${url}" style="width:100%;height:100%;border:none"></iframe>
    </body>
  `);
}

/* CUSTOM */
function openCustom(e){
  ripple(e);
  let url=document.getElementById("url").value.trim();
  if(!url.startsWith("http")) url="https://"+url;
  openBlank(url);
}

/* DISCORD */
function joinDiscord(e){
  ripple(e);
  window.open("https://discord.gg/YOURCODE","_blank");
}

/* RIPPLE */
function ripple(e){
  let b=e.currentTarget;
  let s=document.createElement("span");
  let r=b.getBoundingClientRect();
  s.style.width=s.style.height=Math.max(r.width,r.height)+"px";
  s.style.left=e.clientX-r.left+"px";
  s.style.top=e.clientY-r.top+"px";
  b.appendChild(s);
  setTimeout(()=>s.remove(),600);
}
</script>

</body>
</html>
