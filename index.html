<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nope</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#7c3aed,#020617 70%);
  color:white;
}

/* LOCK */
#lock{
  position:fixed;
  inset:0;
  background:#020617;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lock-box{
  background:rgba(255,255,255,.05);
  padding:30px;
  border-radius:20px;
  text-align:center;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:30px;
  max-width:1100px;
  margin:auto;
}

.box{
  padding:20px;
  border-radius:15px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
}

/* SEARCH */
.search{text-align:center;margin-top:20px}
.search input{padding:10px;width:60%;border-radius:10px;border:none}

/* STATUS */
#status{
  position:fixed;
  bottom:10px;
  right:10px;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
  <div class="lock-box">
    <h2>Enter Key</h2>
    <input id="codeInput">
    <br><br>
    <button onclick="checkCode()">Enter</button>
  </div>
</div>

<div class="nav">
  <h2>Nope Hub V9</h2>
</div>

<div class="search">
  <input id="searchInput" placeholder="Search or URL...">
</div>

<div class="grid" id="grid"></div>

<div id="status">loading...</div>

<script>
// SAFE INIT
window.addEventListener("DOMContentLoaded",()=>{

  const grid = document.getElementById("grid");
  const status = document.getElementById("status");

  // LINKS (YOURS)
  const links={
    truffled:[
      "https://newyork-newspaperprinter.socialistsushi.com/",
      "https://info.callcentercuritibia.com.br/",
      "https://everyonefromthe383.383.li/"
    ],
    sdxp:[
      "http://music.geography.student.seminar.physics.example/",
      "http://chemistry.computer.english.algebra.example/"
    ],
    fern:["https://storage.googleapis.com/fernisbest/index.html"],
    ghostlink:[
      "https://desmos.42web.io/",
      "https://codingcourse-web-dev-html-5.me"
    ],
    apollo:["https://desmoscalculator.onrender.com"],
    utopia:["https://example.com"],
    overcloaked:["https://digitallearninghelp.onlidigital.com/"],
    doge:[],
    vapor:[],
    lunar:[]
  };

  // BUILD GRID (prevents blank bug)
  Object.keys(links).forEach(key=>{
    const div=document.createElement("div");
    div.className="box";
    div.innerText=key;
    div.onclick=()=>openRotating(key);
    grid.appendChild(div);
  });

  // ROTATION
  function openRotating(k){
    if(!links[k] || links[k].length===0){
      alert("no links");
      return;
    }

    let i=parseInt(localStorage.getItem("idx_"+k)||0);
    let url=links[k][i];

    localStorage.setItem("idx_"+k,(i+1)%links[k].length);

    window.open(url,"_blank");
  }

  // SEARCH
  document.getElementById("searchInput").addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      let v=e.target.value.trim();
      if(!v.startsWith("http")){
        v="https://www.google.com/search?q="+encodeURIComponent(v);
      }
      window.open(v,"_blank");
    }
  });

  // LOCK SYSTEM
  window.checkCode=function(){
    let val=document.getElementById("codeInput").value.trim().toLowerCase();
    if(val==="nope"){
      localStorage.setItem("unlocked","true");
      document.getElementById("lock").style.display="none";
    } else {
      alert("wrong");
    }
  };

  // ENTER KEY FIX
  document.getElementById("codeInput").addEventListener("keydown",e=>{
    if(e.key==="Enter") checkCode();
  });

  // AUTO UNLOCK FIX (prevents stuck bug)
  if(localStorage.getItem("unlocked")==="true"){
    document.getElementById("lock").style.display="none";
  }

  status.innerText="loaded ✓";
});
</script>

</body>
</html>
