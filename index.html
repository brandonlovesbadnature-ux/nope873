<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nope</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4c1d95, #7c3aed);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 40px;
      letter-spacing: 2px;
    }

    h2 {
      margin-top: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .box {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      transition: 0.2s;
      backdrop-filter: blur(10px);
    }

    .box:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.2);
    }

    a {
      text-decoration: none;
      color: white;
      display: block;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .desc {
      font-size: 14px;
      color: #e0e0ff;
    }
  </style>
</head>

</html>
