<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>nope</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
  --purple1: #a855f7;
  --purple2: #6366f1;
  --accent1: #38bdf8;
  --glass: rgba(255, 255, 255, 0.06);
  --border: rgba(255, 255, 255, 0.14);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top, #040015, #020008 55%, #000 100%);
  color: #f9fafb;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ULTRA GLOSSY MAIN PANEL */
.card {
  width: 860px;
  max-width: 100%;
  padding: 30px 30px 24px;
  border-radius: 32px;
  position: relative;
  overflow: hidden;

  /* Depthy multi-layer background */
  background:
    radial-gradient(circle at 0% 0%, rgba(148, 163, 253, 0.35), transparent 55%),
    radial-gradient(circle at 100% 0%, rgba(96, 165, 250, 0.22), transparent 55%),
    radial-gradient(circle at 0% 100%, rgba(59, 130, 246, 0.18), transparent 55%),
    linear-gradient(145deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.88));

  border: 1px solid rgba(148, 163, 184, 0.65);
  border-top-color: rgba(248, 250, 252, 0.8);

  backdrop-filter: blur(30px) saturate(220%);
  -webkit-backdrop-filter: blur(30px) saturate(220%);

  box-shadow:
    0 40px 140px rgba(15, 23, 42, 0.95),
    0 0 0 1px rgba(15, 23, 42, 0.95),
    inset 0 1px 0 rgba(255, 255, 255, 0.35);
}

/* Inner gloss bloom */
.card::before {
  content: "";
  position: absolute;
  inset: -40%;
  background:
    radial-gradient(circle at 10% -10%, rgba(255, 255, 255, 0.26), transparent 60%),
    radial-gradient(circle at 90% -20%, rgba(209, 213, 219, 0.18), transparent 65%);
  opacity: 0.9;
  mix-blend-mode: screen;
  pointer-events: none;
}

/* Subtle animated edge light sweep */
.card::after {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 30px;
  border: 1px solid transparent;
  background:
    linear-gradient(135deg, rgba(148, 163, 184, 0.1), rgba(248, 250, 252, 0.65), rgba(148, 163, 184, 0.06))
    border-box;
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask-composite: exclude;
  opacity: 0.6;
  animation: edgeSweep 5s linear infinite;
  pointer-events: none;
}

@keyframes edgeSweep {
  0% { opacity: 0.2; }
  10% { opacity: 0.8; }
  40% { opacity: 0.25; }
  100% { opacity: 0.2; }
}

.card-inner {
  position: relative;
  z-index: 1;
}

/* HEADER (nope) */
.header-panel {
  position: relative;
  border-radius: 22px;
  padding: 14px 20px 13px;
  margin-bottom: 22px;

  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.05));
  backdrop-filter: blur(34px) saturate(260%);
  -webkit-backdrop-filter: blur(34px) saturate(260%);

  border: 1px solid rgba(255, 255, 255, 0.26);
  box-shadow:
    0 18px 50px rgba(148, 163, 184, 0.8),
    inset 0 1px 0 rgba(255, 255, 255, 0.9);
  overflow: hidden;
}

.header-panel::before {
  content: "";
  position: absolute;
  top: -150%;
  left: -30%;
  width: 55%;
  height: 360%;
  background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.7), transparent);
  transform: rotate(-10deg);
  opacity: 0.95;
  mix-blend-mode: screen;
}

.header-panel::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 20px;
  background: linear-gradient(to top, rgba(15, 23, 42, 0.6), transparent);
}

h1 {
  position: relative;
  font-size: 2.5rem;
  letter-spacing: 0.06em;
  text-transform: lowercase;
  margin: 0;

  background: linear-gradient(90deg, #ffffff, #e5e7eb, #c4b5fd, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  position: relative;
  margin-top: 4px;
  font-size: 0.8rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(15, 23, 42, 0.9);
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
}

.tab {
  flex: 1;
  padding: 9px 10px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.82);
  border: 1px solid rgba(148, 163, 184, 0.75);
  cursor: pointer;
  text-align: center;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(226, 232, 240, 0.8);
  transition: all 0.18s ease-out;
  position: relative;
  overflow: hidden;
}

/* tab hover & active states */
.tab::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top, rgba(148, 163, 253, 0.55), transparent 65%);
  opacity: 0;
  transition: opacity 0.25s ease;
  mix-blend-mode: screen;
}

.tab:hover {
  border-color: rgba(191, 219, 254, 0.95);
  color: #e5e7eb;
  box-shadow:
    0 10px 26px rgba(37, 99, 235, 0.6),
    0 0 0 1px rgba(191, 219, 254, 0.25);
}

.tab:hover::before {
  opacity: 0.45;
}

.tab.active {
  background: linear-gradient(135deg, var(--purple1), var(--purple2));
  border-color: rgba(252, 252, 253, 0.95);
  color: #f9fafb;
  box-shadow:
    0 14px 32px rgba(79, 70, 229, 0.8),
    0 0 0 1px rgba(191, 219, 254, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.section {
  display: none;
}

.section.active {
  display: block;
}

/* BUTTONS – IMM A C U L A T E */
.btn {
  width: 100%;
  padding: 13px 14px;
  margin-bottom: 10px;
  border-radius: 16px;
  border: 1px solid rgba(148, 163, 184, 0.9);

  background:
    radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.5), transparent 55%),
    radial-gradient(circle at 100% 0%, rgba(236, 72, 153, 0.4), transparent 55%),
    linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(30, 64, 175, 0.98));

  background-size: 220% 220%;
  color: #e5e7eb;
  cursor: pointer;

  position: relative;
  overflow: hidden;

  transition:
    box-shadow 0.25s ease,
    border-color 0.2s ease,
    background-position 0.25s ease,
    transform 0.18s ease;
}

/* sheen */
.btn::before {
  content: "";
  position: absolute;
  top: -10%;
  left: -150%;
  width: 120%;
  height: 120%;
  background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.5), transparent);
  opacity: 0.9;
  transform: translateX(0) skewX(-12deg);
  transition: transform 0.7s ease;
  mix-blend-mode: screen;
}

/* inner glow ring */
.btn::after {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 14px;
  border: 1px solid rgba(248, 250, 252, 0.14);
  opacity: 0;
  transition: opacity 0.25s ease;
}

.btn:hover::before {
  transform: translateX(190%) skewX(-12deg);
}

.btn:hover::after {
  opacity: 1;
}

.btn:hover {
  background-position: 100% 0;
  border-color: rgba(191, 219, 254, 1);
  box-shadow:
    0 18px 50px rgba(59, 130, 246, 0.75),
    0 0 0 1px rgba(191, 219, 254, 0.4);
}

.btn:active {
  transform: scale(0.985) translateY(1px);
  box-shadow: 0 6px 20px rgba(15, 23, 42, 0.95);
}

/* Magnetic hover movement – gentle so it feels expensive */
.btn[data-magnetic="true"] {
  will-change: transform;
}

/* INPUTS */
input {
  width: 100%;
  padding: 10px 11px;
  border-radius: 12px;
  border: 1px solid rgba(148, 163, 184, 0.9);
  background: rgba(15, 23, 42, 0.92);
  color: #e5e7eb;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.12s ease;
}

input::placeholder {
  color: rgba(148, 163, 184, 0.9);
}

input:focus {
  border-color: rgba(129, 140, 248, 1);
  box-shadow:
    0 0 0 1px rgba(129, 140, 248, 0.9),
    0 14px 36px rgba(79, 70, 229, 0.7);
  background: radial-gradient(circle at top, rgba(37, 99, 235, 0.85), rgba(15, 23, 42, 0.98));
  transform: translateY(-1px);
}

.input-group {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  align-items: center;
}

.input-group input {
  flex: 1;
  min-width: 0;
}

.input-group button {
  flex-shrink: 0;
  white-space: nowrap;
}

/* Footer */
.small {
  margin-top: 16px;
  opacity: 0.7;
  font-size: 0.72rem;
  text-align: right;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.small span {
  background: linear-gradient(90deg, var(--purple1), var(--accent1));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Cursor trail dots */
.trail {
  position: fixed;
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(248, 250, 252, 0.9), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  filter: blur(0.5px);
  animation: fadeOut 0.4s forwards;
  z-index: 3;
}

@keyframes fadeOut {
  from {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  to {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.4);
  }
}

/* Responsive tweaks */
@media (max-width: 640px) {
  .card {
    padding: 20px 18px 18px;
    border-radius: 24px;
  }

  .header-panel {
    padding: 12px 14px;
  }

  h1 {
    font-size: 2rem;
  }

  .subtitle {
    font-size: 0.72rem;
  }

  .tabs {
    gap: 6px;
  }

  .tab {
    font-size: 0.74rem;
    padding: 8px 6px;
  }
}
</style>
</head>

<body>
  <canvas id="bg"></canvas>

  <div class="wrapper">
    <div class="card">
      <div class="card-inner">
        <div class="header-panel">
          <h1>nope</h1>
          <div class="subtitle">portal launcher</div>
        </div>

        <div class="tabs">
          <div class="tab active" onclick="switchTab('home', this)">Home</div>
          <div class="tab" onclick="switchTab('misc', this)">Misc</div>
          <div class="tab" onclick="switchTab('settings', this)">Settings</div>
        </div>

        <!-- HOME -->
        <div id="home" class="section active">
          <button class="btn" data-magnetic="true" onclick="openBlank('https://truffled.onrender.com')">Truffled</button>
          <button class="btn" data-magnetic="true" onclick="openBlank('https://sdxp.onrender.com')">SDXP</button>
          <button class="btn" data-magnetic="true" onclick="openBlank('https://fern.onrender.com')">Fern</button>
          <button class="btn" data-magnetic="true" onclick="openBlank('https://ghostlink.onrender.com')">Ghostlink</button>
          <button class="btn" data-magnetic="true" onclick="openBlank('https://apollo.onrender.com')">Apollo</button>

          <div class="input-group">
            <input id="url" placeholder="https://example.com" />
            <button class="btn" data-magnetic="true" onclick="openCustom()">Open</button>
          </div>
        </div>

        <!-- MISC -->
        <div id="misc" class="section">
          <input id="panicUrl" placeholder="Panic URL" />
          <button class="btn" data-magnetic="true" style="margin-top: 10px" onclick="savePanic()">Save Panic</button>
        </div>

        <!-- SETTINGS -->
        <div id="settings" class="section">
          <button class="btn" data-magnetic="true" onclick="applyCloak()">Apply Cloak</button>
        </div>

        <div class="small">made by <span>nope</span></div>
      </div>
    </div>
  </div>

  <script>
    /* Tabs */
    function switchTab(id, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(id).classList.add('active');
    }

    /* Fixed about:blank loader – full shell, centered loader, then iframe */
    function openBlank(url) {
      const w = window.open('about:blank', '_blank');
      if (!w) return;

      const loaderHTML = `
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8" />
          <title>Loading...</title>
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            html, body { height: 100%; width: 100%; }
            body {
              display: flex;
              align-items: center;
              justify-content: center;
              background: radial-gradient(circle at top, #020617, #000);
              color: #e5e7eb;
              font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
              overflow: hidden;
            }
            .spinner-wrapper {
              position: relative;
              width: 104px;
              height: 104px;
              display: flex;
              align-items: center;
              justify-content: center;
            }
            .ring {
              position: absolute;
              border-radius: 999px;
              border: 3px solid rgba(148, 163, 184, 0.3);
              border-top-color: rgba(129, 140, 248, 1);
              border-right-color: rgba(56, 189, 248, 0.9);
              animation: spin 1.15s linear infinite;
            }
            .ring.r1 { width: 72px; height: 72px; filter: drop-shadow(0 0 16px rgba(129, 140, 248, 0.9)); }
            .ring.r2 {
              width: 52px; height: 52px;
              border-width: 2px;
              border-top-color: rgba(248, 250, 252, 0.95);
              border-right-color: rgba(96, 165, 250, 0.9);
              animation-duration: 0.9s;
              animation-direction: reverse;
            }
            .dot {
              width: 8px; height: 8px;
              border-radius: 999px;
              background: radial-gradient(circle, #e5e7eb, transparent 70%);
              box-shadow: 0 0 22px rgba(248, 250, 252, 0.9);
            }
            .label {
              position: absolute;
              bottom: -34px;
              width: 200px;
              text-align: center;
              font-size: 11px;
              letter-spacing: 0.12em;
              text-transform: uppercase;
              color: rgba(148, 163, 184, 0.9);
            }
            @keyframes spin {
              to { transform: rotate(360deg); }
            }
            iframe {
              position: absolute;
              inset: 0;
              width: 100%;
              height: 100%;
              border: none;
            }
          </style>
        </head>
        <body>
          <div class="spinner-wrapper" id="spinner">
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <div class="dot"></div>
            <div class="label">loading portal</div>
          </div>
          <script>
            const targetUrl = ${JSON.stringify(url)};
            const iframe = document.createElement('iframe');
            iframe.src = targetUrl;
            iframe.onload = () => {
              const spinner = document.getElementById('spinner');
              if (spinner) spinner.style.display = 'none';
            };
            document.body.appendChild(iframe);
          <\/script>
        </body>
        </html>
      `;

      w.document.open();
      w.document.write(loaderHTML);
      w.document.close();
    }

    /* Custom URL opener */
    function openCustom() {
      let url = document.getElementById('url').value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      openBlank(url);
    }

    /* Panic */
    let panic = localStorage.getItem('panic') || 'https://google.com';
    function savePanic() {
      const val = document.getElementById('panicUrl').value.trim();
      if (val) {
        panic = val;
        localStorage.setItem('panic', panic);
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === '`') location.href = panic;
    });

    /* Cloak */
    function applyCloak() {
      document.title = 'Google';
    }

    /* Magnetic hover for all btns */
    document.querySelectorAll('.btn[data-magnetic="true"]').forEach((btn) => {
      btn.addEventListener('mousemove', (e) => {
        const r = btn.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;
        const moveX = (x - r.width / 2) / 18;
        const moveY = (y - r.height / 2) / 18;
        btn.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });

      btn.addEventListener('mouseleave', () => {
        btn.style.transform = 'translate(0, 0)';
      });
    });

    /* Cursor trail */
    document.addEventListener('mousemove', (e) => {
      const d = document.createElement('div');
      d.className = 'trail';
      d.style.left = e.clientX + 'px';
      d.style.top = e.clientY + 'px';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 400);
    });

    /* Bouncing particles */
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const balls = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 3 + 1,
      dx: (Math.random() - 0.5) * 1.2,
      dy: (Math.random() - 0.5) * 1.2,
    }));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      balls.forEach((b) => {
        b.x += b.dx;
        b.y += b.dy;

        if (b.x < 0 || b.x > canvas.width) b.dx *= -1;
        if (b.y < 0 || b.y > canvas.height) b.dy *= -1;

        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(168, 139, 250, 0.7)';
        ctx.fill();
      });

      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
