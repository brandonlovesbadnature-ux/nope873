<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nope</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #7c3aed, #2e1065 70%);
  color: white;
  overflow-x: hidden;
}

/* TITLE */
h1 {
  text-align: center;
  padding: 30px;
  font-size: 44px;
  letter-spacing: 2px;
  font-weight: 600;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 30px;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}

/* GLASS CARD */
.box {
  position: relative;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  cursor: pointer;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.15);

  transition: all 0.4s cubic-bezier(.25,.8,.25,1);
}

/* GLOSS EFFECT */
.box::before {
  content: "";
  position: absolute;
  top: 0;
  left: -50%;
  width: 200%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  transform: skewX(-20deg);
  opacity: 0;
}

/* HOVER MAGIC */
.box:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.4),
    0 0 30px rgba(124,58,237,0.6);
  background: rgba(255,255,255,0.12);
}

.box:hover::before {
  animation: shine 0.8s forwards;
}

@keyframes shine {
  from { left: -60%; opacity: 0; }
  50% { opacity: 1; }
  to { left: 120%; opacity: 0; }
}

.title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}

.desc {
  font-size: 14px;
  opacity: 0.7;
}

/* SPARKLES */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  filter: blur(1px);
  animation: float 12s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>nope</h1>

<!-- SPARKLES -->
<script>
for (let i = 0; i < 35; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDuration = (8 + Math.random() * 10) + "s";
  s.style.opacity = Math.random();
  document.body.appendChild(s);
}
</script>

<!-- GRID -->
<div class="grid">

  <div class="box" onclick="window.open('desmoscalculator.onrender.com')">
    <div class="title">Apollo</div>
    <div class="desc">Main app</div>
  </div>

  <div class="box" onclick="window.open('https://example.org')">
    <div class="title">Games</div>
    <div class="desc">Play stuff</div>
  </div>

  <div class="box" onclick="window.open('https://example.net')">
    <div class="title">Tools</div>
    <div class="desc">Useful sites</div>
  </div>

</div>

</body>
</html>
