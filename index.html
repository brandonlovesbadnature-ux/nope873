<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>nope</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    :root {
      --bg-1: #051421;
      --bg-2: #0b1d30;
      --bg-3: #112c45;
      --glass-1: rgba(12, 24, 39, 0.78);
      --glass-2: rgba(18, 35, 56, 0.52);
      --glass-edge: rgba(255, 255, 255, 0.18);
      --glass-highlight: rgba(255, 255, 255, 0.26);
      --text: #f4fbff;
      --muted: #8ea8bd;
      --accent: #86e6ff;
      --accent-2: #8ea0ff;
      --accent-3: #ffd8f3;
      --shadow: rgba(3, 10, 22, 0.58);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at 16% 18%, rgba(134, 230, 255, 0.18), transparent 28%),
        radial-gradient(circle at 84% 18%, rgba(255, 216, 243, 0.16), transparent 24%),
        radial-gradient(circle at 50% 112%, rgba(142, 160, 255, 0.3), transparent 38%),
        linear-gradient(145deg, var(--bg-1), #040c15 46%, #07111c 100%);
      color: var(--text);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -12%;
      background:
        radial-gradient(circle at 28% 26%, rgba(255, 255, 255, 0.22), transparent 18%),
        radial-gradient(circle at 72% 22%, rgba(134, 230, 255, 0.16), transparent 22%),
        radial-gradient(circle at 52% 78%, rgba(142, 160, 255, 0.2), transparent 24%);
      filter: blur(78px);
      animation: move 18s ease-in-out infinite;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(130deg, rgba(255, 255, 255, 0.06), transparent 24%, transparent 58%, rgba(255, 255, 255, 0.03) 82%, transparent),
        repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.02) 0 2px, transparent 2px 34px);
      mix-blend-mode: screen;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes move {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(-50px, 34px);
      }
    }

    .wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: clamp(18px, 4vw, 42px);
    }

    .card {
      width: min(960px, 100%);
      padding: clamp(22px, 3vw, 32px);
      border-radius: 34px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.03) 18%, transparent 30%),
        linear-gradient(155deg, rgba(17, 31, 49, 0.9), rgba(10, 20, 34, 0.74) 50%, rgba(18, 38, 60, 0.58));
      backdrop-filter: blur(30px) saturate(170%);
      -webkit-backdrop-filter: blur(30px) saturate(170%);
      border: 1px solid var(--glass-edge);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -20px 40px rgba(7, 16, 28, 0.4),
        0 28px 90px rgba(2, 8, 18, 0.64),
        0 3px 18px rgba(134, 230, 255, 0.12);
    }

    .card::before {
      content: "";
      position: absolute;
      left: -10%;
      top: -35%;
      width: 76%;
      height: 62%;
      background: linear-gradient(125deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.1) 36%, transparent 60%);
      animation: glassMove 14s ease-in-out infinite;
      mix-blend-mode: screen;
      opacity: 0.8;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top right, rgba(134, 230, 255, 0.18), transparent 32%),
        radial-gradient(circle at bottom left, rgba(142, 160, 255, 0.14), transparent 26%);
      mix-blend-mode: screen;
      opacity: 0.7;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    @keyframes glassMove {
      0%,
      100% {
        transform: translate(-8%, -4%) rotate(8deg);
      }
      50% {
        transform: translate(18%, 10%) rotate(6deg);
      }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    header > div:first-child {
      max-width: 70%;
    }

    h1 {
      font-size: clamp(2.3rem, 5vw, 3.45rem);
      line-height: 0.95;
      background: linear-gradient(90deg, #ffffff 0%, #eefaff 36%, #b6f3ff 60%, #d6d0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.7rem;
      color: rgba(239, 248, 255, 0.84);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .subtitle::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff, var(--accent));
      box-shadow: 0 0 18px rgba(134, 230, 255, 0.85);
    }

    .tabs {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(9, 19, 33, 0.54);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 12px 36px rgba(2, 8, 18, 0.24);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .tab {
      padding: 8px 16px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 0.76rem;
      font-weight: 600;
      color: #9ab9cf;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: transform 0.18s ease, color 0.18s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .tab:hover {
      color: #eff9ff;
    }

    .tab.active {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08)),
        linear-gradient(135deg, rgba(134, 230, 255, 0.28), rgba(142, 160, 255, 0.22));
      color: #f9fdff;
      border-color: rgba(255, 255, 255, 0.22);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.34),
        0 12px 24px rgba(142, 160, 255, 0.18);
    }

    main {
      margin-top: 10px;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
      padding: 22px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02) 22%, transparent 60%),
        linear-gradient(160deg, rgba(16, 30, 46, 0.72), rgba(11, 22, 36, 0.5));
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -18px 30px rgba(5, 12, 24, 0.22);
      animation: sectionReveal 0.35s ease;
    }

    @keyframes sectionReveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .grid-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(134, 230, 255, 0.36), rgba(255, 255, 255, 0));
    }

    .proxy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .btn {
      width: 100%;
      min-height: 76px;
      padding: 14px 14px 13px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04) 26%, transparent 38%),
        linear-gradient(145deg, rgba(23, 40, 61, 0.86), rgba(13, 24, 38, 0.74) 56%, rgba(28, 53, 78, 0.66));
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.24s ease, border-color 0.2s;
      text-align: left;
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 18px 34px rgba(2, 8, 18, 0.22);
    }

    .btn-label {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .btn-sub {
      font-size: 0.69rem;
      opacity: 0.72;
      margin-top: 4px;
      color: #c7d7e5;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: -35%;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.28), transparent 34%);
      opacity: 0;
      transition: opacity 0.24s ease;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .btn::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 0;
      height: 44%;
      border-radius: 0 0 20px 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent);
      opacity: 0.7;
      pointer-events: none;
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.24),
        0 24px 44px rgba(28, 72, 109, 0.28),
        0 0 0 1px rgba(134, 230, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .btn:active {
      transform: translateY(1px) scale(0.992);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 12px 24px rgba(2, 8, 18, 0.28);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 16px;
      margin-top: 8px;
    }

    .settings-grid > div {
      padding: 16px;
      border-radius: 22px;
      background:
        linear-gradient(170deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02) 26%, rgba(7, 16, 28, 0.18)),
        rgba(7, 16, 28, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    @media (max-width: 780px) {
      .wrapper {
        align-items: flex-start;
      }

      .card {
        border-radius: 28px;
      }

      .settings-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      header > div:first-child {
        max-width: 100%;
      }

      .tabs {
        width: 100%;
        justify-content: space-between;
      }

      .tab {
        flex: 1;
        text-align: center;
      }
    }

    .block-label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      align-items: stretch;
    }

    .input-group .btn {
      width: auto;
      min-width: 120px;
      min-height: auto;
      padding-inline: 18px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(5, 15, 28, 0.72);
      color: white;
      font-size: 0.82rem;
      letter-spacing: 0.01em;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s, transform 0.18s;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    input::placeholder {
      color: rgba(154, 176, 196, 0.9);
    }

    input:focus {
      border-color: rgba(134, 230, 255, 0.65);
      box-shadow:
        0 0 0 4px rgba(134, 230, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03)),
        rgba(7, 18, 30, 0.84);
      transform: translateY(-1px);
    }

    .settings-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hint {
      font-size: 0.7rem;
      color: #bcd0e0;
      opacity: 0.78;
      text-align: right;
      margin-top: 8px;
    }

    footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a8c0d4;
      text-align: right;
    }

    .trail {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffffff, var(--accent) 45%, rgba(142, 160, 255, 0.55) 70%);
      pointer-events: none;
      animation: fadeTrail 0.45s forwards;
      filter: blur(0.2px);
      mix-blend-mode: screen;
      z-index: 9999;
      box-shadow: 0 0 18px rgba(134, 230, 255, 0.45);
    }

    @keyframes fadeTrail {
      0% {
        opacity: 0.92;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(0.25) translateY(4px);
      }
    }

    @media (max-width: 560px) {
      .wrapper {
        padding: 16px;
      }

      .card {
        padding: 18px;
      }

      .section.active {
        padding: 16px;
        border-radius: 22px;
      }

      .proxy-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .input-group {
        flex-direction: column;
      }

      .input-group .btn {
        width: 100%;
      }

      h1 {
        font-size: 2.3rem;
      }

      .tabs {
        padding: 4px;
      }

      footer {
        text-align: left;
      }
    }
  </style>
</head>

  </div>

    function switchTab(id, el) {
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));
      document.querySelectorAll(".section").forEach((section) => section.classList.remove("active"));
      el.classList.add("active");
      document.getElementById(id).classList.add("active");
    }

    f.onload = () => {

      w.document.open();
      w.document.write(loaderHTML);

    }

    function openCustom() {
      const input = document.getElementById("url");
      let url = input.value.trim();
      if (!url) {
        return;
      }

      if (!/^https?:\/\//i.test(url)) {
        url = "https://" + url;
      }

      openBlank(url);
    }

    function safeGet(id) {
      return document.getElementById(id) || null;
    }

    function normalizeUrl(value, fallback) {
      const trimmed = (value || "").trim();
      if (!trimmed) {
        return fallback;
      }

      if (/^https?:\/\//i.test(trimmed)) {
        return trimmed;
      }

      return "https://" + trimmed;
    }

    function displayCurrentPanicState() {
      const panicUrlInput = safeGet("panicUrl");
      const panicHint = safeGet("panicHint");
      const panicKey = localStorage.getItem(PANIC_KEY_STORAGE) || "`";
      const panicUrl = localStorage.getItem(PANIC_URL_STORAGE) || "https://www.google.com";

      if (panicUrlInput) {
        panicUrlInput.value = panicUrl;
      }

      if (panicHint) {
        panicHint.innerHTML = "panic key: <b>" + panicKey + "</b> -> " + panicUrl;
      }
    }

    function savePanic() {
      const input = safeGet("panicUrl");
      if (!input) {
        return;
      }

      const nextUrl = normalizeUrl(input.value, "https://www.google.com");
      localStorage.setItem(PANIC_URL_STORAGE, nextUrl);
      displayCurrentPanicState();
    }

    function handlePanicKey(event) {
      const activeTag = document.activeElement ? document.activeElement.tagName : "";
      const isTyping = activeTag === "INPUT" || activeTag === "TEXTAREA";
      if (isTyping) {
        return;
      }

      const panicKey = localStorage.getItem(PANIC_KEY_STORAGE) || "`";
      const panicUrl = localStorage.getItem(PANIC_URL_STORAGE) || "https://www.google.com";

      if (event.key === panicKey) {
        event.preventDefault();
        window.location.assign(panicUrl);
      }
    }

    function ensureFavicon() {
      let link = document.querySelector("link[rel='icon']");
      if (!link) {
        link = document.createElement("link");
        link.rel = "icon";
        document.head.appendChild(link);
      }
      return link;
    }

    function applyCloak(cloak) {
      if (!cloak) {
        removeCloak();
        return;
      }

      document.title = cloak.title;
      ensureFavicon().href = cloak.icon;
      localStorage.setItem(CLOAK_STORAGE, JSON.stringify(cloak));
    }

    function applyCloakByName(name) {
      applyCloak(cloaks[name]);
    }

    function removeCloak() {
      document.title = ORIGINAL_TITLE;
      const favicon = ensureFavicon();
      favicon.href = "data:,";
      localStorage.removeItem(CLOAK_STORAGE);
    }

    function restoreSavedCloak() {
      const saved = localStorage.getItem(CLOAK_STORAGE);
      if (!saved) {
        return;
      }

      try {
        const cloak = JSON.parse(saved);
        applyCloak(cloak);
      } catch (error) {
        localStorage.removeItem(CLOAK_STORAGE);
      }
    }

    document.querySelectorAll("[data-magnetic]").forEach((btn) => {
      btn.addEventListener("mousemove", (event) => {
        const rect = btn.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        btn.style.setProperty("--x", x + "px");
        btn.style.setProperty("--y", y + "px");
        btn.style.transform = `translate(${(x - rect.width / 2) / 10}px, ${(y - rect.height / 2) / 10}px)`;
      });

      btn.addEventListener("mouseleave", () => {
        btn.style.transform = "translate(0, 0)";
      });
    });

    document.addEventListener("mousemove", (event) => {
      const dot = document.createElement("div");
      dot.className = "trail";
      dot.style.left = event.clientX + "px";
      dot.style.top = event.clientY + "px";
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 450);
    });

    const canvas = document.getElementById("particles");
    const ctx = canvas ? canvas.getContext("2d") : null;
    const particles = [];

    function resize() {
      if (!canvas) {
        return;
      }

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = Math.random() * 2.5 + 0.5;
        this.speedY = Math.random() * 0.6 + 0.2;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.6 + 0.2;
      }

      update() {
        this.y -= this.speedY;
        this.x += this.speedX;

        if (this.y < -10) {
          this.reset();
        }
      }

      draw() {
        const tint = this.size > 1.7 ? "255, 216, 243" : "134, 230, 255";
        ctx.beginPath();
        ctx.fillStyle = `rgba(${tint}, ${this.opacity})`;
        ctx.shadowBlur = 14;
        ctx.shadowColor = this.size > 1.7 ? "rgba(255, 216, 243, 0.9)" : "rgba(134, 230, 255, 0.9)";
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animate() {
      if (!ctx || !canvas) {
        return;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((particle) => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animate);
    }

    if (canvas && ctx) {
      resize();
      window.addEventListener("resize", resize);
      for (let i = 0; i < 120; i += 1) {
        particles.push(new Particle());
      }
      animate();
    }

    window.addEventListener("keydown", handlePanicKey);
    restoreSavedCloak();
    displayCurrentPanicState();
  </script>
</body>
